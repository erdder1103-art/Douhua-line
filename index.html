<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>灰胖落空</title>

  <!-- Meta Pixel Code -->
  <script>
    window.APP_CONFIG = {
      PIXEL_IDS: [
        '1552608176255688',
        '1672198530573964'
      ],
      LINE_URL: 'https://line.me/R/ti/p/@794qnnum',
      REDIRECT_DELAY: 800
    };

    !function(f,b,e,v,n,t,s){
      if(f.fbq)return;
      n=f.fbq=function(){
        n.callMethod ? n.callMethod.apply(n,arguments) : n.queue.push(arguments);
      };
      if(!f._fbq)f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e);
      t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    }(window, document, 'script', 'https://connect.facebook.net/en_US/fbevents.js');

    window.APP_CONFIG.PIXEL_IDS.forEach(function(pixelId){
      fbq('init', pixelId);
    });

    fbq('track', 'PageView');

  <noscript>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=787960040834696&ev=PageView&noscript=1" alt=""/>
    <img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=1672198530573964&ev=PageView&noscript=1" alt=""/>
  </noscript>

  <style>
    *{box-sizing:border-box;}

    body{
      margin:0;
      background:#000;
      font-family:system-ui,-apple-system,"PingFang TC","Noto Sans TC",Arial,sans-serif;
    }

    .wrapper{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .frame{
      position:relative;
      width:100%;
      max-width:420px;
      aspect-ratio:9/16;
      overflow:hidden;
      background:#000;
    }

    .bg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
    }

    .logo{
      position:absolute;
      top:-5%;
      left:50%;
      transform:translateX(-50%);
      width:60%;
      display:block;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    .ip{
      position:absolute;
      bottom:12%;
      left:50%;
      transform:translateX(-50%);
      width:90%;
      display:block;
      pointer-events:none;
      user-select:none;
      -webkit-user-drag:none;
    }

    .btnWrapper{
      position:absolute;
      bottom:6%;
      left:50%;
      transform:translateX(-50%);
      width:80%;
      z-index:5;
    }

    .goLine{
      display:block;
      width:100%;
      text-decoration:none;
      -webkit-tap-highlight-color:transparent;
      outline:none;
    }

    .btn{
      width:100%;
      cursor:pointer;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
      animation:breath 1.8s ease-in-out infinite;
    }

    .goLine.is-disabled{
      pointer-events:none;
      opacity:0.98;
    }

    @keyframes breath{
      0%{transform:scale(1);}
      50%{transform:scale(1.08);}
      100%{transform:scale(1);}
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <div class="frame">
      <img src="assets/bg.jpg" class="bg" alt="" loading="eager">
      <img src="assets/logo.png" class="logo" alt="" loading="eager">
      <img src="assets/ip.png" class="ip" alt="" loading="eager">

      <div class="btnWrapper">
        <a
          href="https://line.me/R/ti/p/@794qnnum"
          class="goLine"
          data-area="main_cta"
          rel="noopener"
          aria-label="加入官方LINE"
        >
          <img src="assets/btn.png" class="btn" alt="加入官方LINE" loading="eager">
        </a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var LINE_URL = window.APP_CONFIG.LINE_URL;
      var REDIRECT_DELAY = window.APP_CONFIG.REDIRECT_DELAY;
      var hasClicked = false;
      var redirectTimer = null;

      function uuidv4() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }
        return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {
          var r = Math.random() * 16 | 0;
          var v = c === "x" ? r : (r & 0x3 | 0x8);
          return v.toString(16);
        });
      }

      function sendTrack(eventName, params, options) {
        try {
          if (typeof fbq === "function") {
            fbq("track", eventName, params || {}, options || {});
          }
        } catch (e) {}
      }

      function sendTrackCustom(eventName, params, options) {
        try {
          if (typeof fbq === "function") {
            fbq("trackCustom", eventName, params || {}, options || {});
          }
        } catch (e) {}
      }

      function fireEvents(area) {
        var baseArea = area || "main_cta";

        var commonParams = {
          content_name: "line_contact_click",
          content_category: "line_redirect",
          contact_method: "line",
          click_area: baseArea,
          destination: "official_line"
        };

        sendTrack("Contact", commonParams, {
          eventID: "contact_" + uuidv4()
        });

        sendTrack("Lead", commonParams, {
          eventID: "lead_" + uuidv4()
        });

        sendTrackCustom("LineClick", {
          click_area: baseArea,
          destination: "official_line",
          contact_method: "line"
        }, {
          eventID: "lineclick_" + uuidv4()
        });
      }

      function goToLine() {
        window.location.href = LINE_URL;
      }

      function resetState(){
        hasClicked = false;
        if (redirectTimer) {
          clearTimeout(redirectTimer);
          redirectTimer = null;
        }

        document.querySelectorAll(".goLine").forEach(function(link) {
          link.classList.remove("is-disabled");
          link.style.pointerEvents = "";
        });
      }

      function handleClick(e) {
        e.preventDefault();

        if (hasClicked) return;
        hasClicked = true;

        var area = this.getAttribute("data-area") || "main_cta";

        document.querySelectorAll(".goLine").forEach(function(link) {
          link.classList.add("is-disabled");
          link.style.pointerEvents = "none";
        });

        fireEvents(area);

        redirectTimer = setTimeout(function () {
          goToLine();
        }, REDIRECT_DELAY);
      }

      document.querySelectorAll(".goLine").forEach(function(link) {
        link.addEventListener("click", handleClick, { passive: false });
      });

      window.addEventListener("pageshow", function(event) {
        if (event.persisted) {
          resetState();
        } else {
          hasClicked = false;
        }
      });
    })();
  </script>
</body>
</html>
